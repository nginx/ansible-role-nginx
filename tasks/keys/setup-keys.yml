---
- name: (Alpine Linux) Set up signing key
  when: ansible_facts['os_family'] == 'Alpine'
  block:
    - name: (Alpine Linux) Set up NGINX signing key URL
      ansible.builtin.set_fact:
        keysite: "{{ nginx_signing_key | default(nginx_default_signing_key_rsa_pub) }}"

    - name: (Alpine Linux) Download NGINX signing key
      ansible.builtin.get_url:
        url: "{{ keysite }}"
        dest: /etc/apk/keys/nginx_signing.rsa.pub
        mode: "0400"

- name: (Debian/Red Hat/SLES OSs) Set up NGINX signing key URL
  ansible.builtin.set_fact:
    keysite: "{{ nginx_signing_key | default(nginx_default_signing_key_pgp) }}"
  when: ansible_facts['os_family'] != 'Alpine'

- name: (Debian/Ubuntu) Add NGINX signing key
  ansible.builtin.get_url:
    url: "{{ keysite }}"
    dest: /usr/share/keyrings/nginx-archive-keyring.gpg.asc
    checksum: sha256:55385da31d198fa6a5012d40ae98ecb272a6c4e8fffffba94719ffd3e87de37a
    mode: '0644'
  when: ansible_facts['os_family'] == 'Debian'

- name: (Red Hat/SLES OSs) Check if NGINX signing key is already imported # noqa command-instead-of-module
  ansible.builtin.command: rpm -q gpg-pubkey --qf '%{summary}\n'
  register: _nginx_key_imported
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] in ['RedHat', 'Suse']

- name: (Red Hat/SLES OSs) Download NGINX signing key
  ansible.builtin.get_url:
    url: "{{ keysite }}"
    dest: /tmp/
    checksum: sha256:55385da31d198fa6a5012d40ae98ecb272a6c4e8fffffba94719ffd3e87de37a
    mode: '0644'
  register: nginx_key
  when:
    - ansible_facts['os_family'] in ['RedHat', 'Suse']
    - "'nginx.com' not in (_nginx_key_imported.stdout | lower)"

- name: (Red Hat/SLES OSs) Add NGINX signing key # noqa command-instead-of-module
  ansible.builtin.command: rpm --import /tmp/nginx_signing.key
  when:
    - ansible_facts['os_family'] in ['RedHat', 'Suse']
    - "'nginx.com' not in (_nginx_key_imported.stdout | lower)"
  changed_when: true

- name: Cleanup downloads
  ansible.builtin.file:
    path: "{{ nginx_key['dest'] | default('') }}"
    state: absent
  when:
    - ansible_facts['os_family'] in ['RedHat', 'Suse']
    - "'nginx.com' not in (_nginx_key_imported.stdout | lower)"
