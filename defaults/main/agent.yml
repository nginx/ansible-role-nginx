---
# Install the NGINX Agent.
# Requires access to either the NGINX stub_status or the NGINX Plus REST API.
nginx_agent_enable: false


########################################################################################################################
# The following parameters let you configure the static configuration file of NGINX Agent.                             #
# By default, the config produced is as close a match to the default config provided by NGINX Agent upon installation. #
########################################################################################################################

# Configure the NGINX Agent.
nginx_agent_configure: false

# Specify the log level and path.
# Default is info for the log level and /var/log/nginx-agent/ for the log path.
nginx_agent_log:
  level: info
  path: /var/log/nginx-agent/

# Configure polling frequencies for the instance, health, and file watchers.
# nginx_agent_watchers:
#   instance_watcher:
#     monitoring_frequency: 10s
#   instance_health_watcher:
#     monitoring_frequency: 10s
#   file_watcher:
#     monitoring_frequency: 10s
#     exclude_files:
#       - \.*log$

# Key/value labels to attach to this agent instance.
# nginx_agent_labels:
#   env: prod
#   team: backend

# NGINX Agent features to enable.
# Available: configuration, certificates, file-watcher, metrics, api-action, logs-nap
# Default is all features enabled when not specified.
# nginx_agent_features:
#   - configuration
#   - certificates
#   - file-watcher
#   - metrics
#   - logs-nap

# Configure the syslog server port for NAP log ingestion.
# nginx_agent_syslog_server:
#   port: 1514

# NGINX data plane configuration options.
# nginx_agent_data_plane_config:
#   api_url: "http://127.0.0.1:80/api"
#   reload_monitoring_period: 30s
#   treat_warnings_as_errors: false
#   exclude_logs:
#     - /var/log/nginx/error.log
#     - ^/var/log/nginx/.*.log$
#   reload_backoff:
#     initial_interval: 100ms
#     max_interval: 20s
#     max_elapsed_time: 15s
#     randomization_factor: 1.5
#     multiplier: 1.5

# HTTP and gRPC client settings.
# nginx_agent_client:
#   http:
#     timeout: 15s
#   grpc:
#     keepalive:
#       timeout: 15s
#       time: 10s
#       permit_without_stream: false
#     max_message_size: 1048575
#     max_message_receive_size: 1048575
#     max_message_send_size: 1048575
#     max_file_size: 485753
#     response_timeout: 30s
#     file_chunk_size: 48575
#     max_parallel_file_operations: 10
#   backoff:
#     initial_interval: 200ms
#     max_interval: 10s
#     max_elapsed_time: 25s
#     randomization_factor: 1.5
#     multiplier: 2.5

# Specify the control plane server host, port, and data plane key/token.
# The data plane key is required to authenticate NGINX Agent with the NGINX One SaaS control plane available in F5 Distributed Cloud.
# Default is the NGINX One SaaS control plane available in F5 Distributed Cloud.
# nginx_agent_server:
#   host: agent.connect.nginx.com
#   port: 443
#   data_plane_key: ""
#   tokenpath: /path/to/token/file

# Enable TLS communication between data plane and control plane.
# Optionally, specify the path to the TLS certificate, key, and CA certificate to enable mTLS.
# nginx_agent_tls:
#   skip_verify: false
#   cert: /path/to/cert
#   key: /path/to/key
#   ca: /path/to/ca
#   server_name: my-control-plane.example.com

# Specify an auxiliary command server (secondary management plane).
# Supports the same fields as nginx_agent_server/nginx_agent_tls.
# nginx_agent_auxiliary_command:
#   host: second.management.plane
#   port: 9999
#   data_plane_key: ""
#   tokenpath: /path/to/token/file
#
# nginx_agent_auxiliary_command_tls:
#   skip_verify: false
#   cert: /path/to/cert
#   key: /path/to/key
#   ca: /path/to/ca
#   server_name: aux-plane.example.com

# Directories the agent is allowed to read/write.
# Defaults cover standard NGINX and App Protect paths.
nginx_agent_allowed_directories:
  - /etc/nginx
  - /etc/app_protect
  - /usr/local/etc/nginx
  - /usr/share/nginx/modules
  - /var/run/nginx
  - /var/log/nginx

# OpenTelemetry collector configuration.
# The entire collector block is passed as-is to the resulting config file.
